framework:
  - terraform
quiet: true
compact: true
skip-check:
  - CKV_AWS_18  # S3 access logging — requires a separate logging bucket, not needed for bootstrap
  - CKV_AWS_52  # S3 MFA delete — not practical for programmatic ops bucket
  - CKV_AWS_144 # S3 cross-region replication — unnecessary for bootstrap ops
  - CKV_AWS_273 # IAM access key at user creation — intentional for bootstrap output
  - CKV_AWS_40  # IAM policies attached to users — intentional for bootstrap IAM users
  - CKV_AWS_145 # S3 KMS encryption — using default SSE-S3, not KMS, for bootstrap ops bucket
  - CKV2_AWS_61 # S3 lifecycle configuration — not required for bootstrap ops bucket
  - CKV2_AWS_62 # S3 event notifications — not required for bootstrap ops bucket
skip-path:
  - .terraform
  - terraform.tfstate
  - terraform.tfstate.backup
